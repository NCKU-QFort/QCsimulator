name: Auto Tag on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to compare

      - name: Check version changed
        id: check
        run: |
          # Get previous version from the commit before HEAD
          PREV_VERSION=$(git show HEAD^:package.json | jq -r .version)
          # Get current version from HEAD
          CURR_VERSION=$(jq -r .version package.json)
          
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURR_VERSION" >> $GITHUB_OUTPUT
            echo "✅ Version changed: $PREV_VERSION → $CURR_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Version unchanged ($CURR_VERSION)"
          fi

      - name: Create and push tag
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TAG_NAME="v${{ steps.check.outputs.version }}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          
          echo "🏷️ Created and pushed tag: $TAG_NAME"
          echo "🚀 This will trigger deployment to GitHub Pages"
